<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat de Soporte - Hotel</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { background-color: #fff; width: 400px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        .chat-header { background-color: #2c3e50; color: #fff; padding: 15px; text-align: center; font-weight: bold; }
        .status { font-size: 12px; color: #4caf50; display: block; margin-top: 5px; }
        .chat-messages { height: 300px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-color: #fafafa; }
        .message { padding: 10px; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
        .message.bot { background-color: #e9ecef; align-self: flex-start; border-bottom-left-radius: 0; }
        .message.user { background-color: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .chat-input { display: flex; border-top: 1px solid #ddd; }
        .chat-input input { flex: 1; padding: 15px; border: none; outline: none; font-size: 14px; }
        .chat-input button { padding: 15px 20px; border: none; background-color: #007bff; color: white; cursor: pointer; font-weight: bold; }
        .chat-input button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        Asistente del Hotel
        <span class="status" id="status">Conectando...</span>
    </div>
    <div class="chat-messages" id="messages">
        </div>
    <div class="chat-input">
        <input type="text" id="messageText" placeholder="Escribe tu duda aquí (ej. mascotas, check-in)..." autocomplete="off">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
    // 1. Iniciamos la conexión WebSocket al endpoint que creamos
    // Cambiamos "Cesar" por un usuario genérico, o puedes poner tu nombre
    const ws = new WebSocket("ws://127.0.0.1:8000/ws/chat/Cesar");
    const messagesDiv = document.getElementById("messages");
    const statusSpan = document.getElementById("status");
    const inputField = document.getElementById("messageText");

    // 2. Evento: Cuando la conexión se establece correctamente
    ws.onopen = function() {
        statusSpan.textContent = "🟢 En línea";
        statusSpan.style.color = "#4caf50";
    };

    // 3. Evento: Cuando recibimos un mensaje del servidor
    ws.onmessage = function(event) {
        // En el backend enviamos "Asistente: [mensaje]", podemos limpiarlo o dejarlo
        let text = event.data;
        if(text.startsWith("Asistente: ")) {
            text = text.replace("Asistente: ", "");
        }
        addMessage(text, "bot");
    };

    // 4. Evento: Si el servidor se desconecta
    ws.onclose = function() {
        statusSpan.textContent = "🔴 Desconectado";
        statusSpan.style.color = "#dc3545";
    };

    // Permitir enviar con la tecla Enter
    inputField.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });

    // Función para enviar mensaje al servidor
    function sendMessage() {
        const text = inputField.value.trim();
        if (text !== "") {
            addMessage(text, "user"); // Mostramos nuestro mensaje en la pantalla
            ws.send(text);            // Enviamos el texto puro al servidor a través del WebSocket
            inputField.value = "";    // Limpiamos la caja de texto
        }
    }

    // Función auxiliar para dibujar el mensaje en la pantalla
    function addMessage(text, sender) {
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("message", sender);
        msgDiv.textContent = text;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight; // Auto-scroll hacia abajo
    }
</script>

</body>
</html>
