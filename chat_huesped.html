<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat Huésped - Hotel</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; margin-top: 50px; }
        .chat-container { background-color: #fff; width: 400px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .chat-header { background-color: #2c3e50; color: #fff; padding: 15px; text-align: center; font-weight: bold; }
        .chat-messages { height: 350px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-color: #fafafa; }
        .message { padding: 10px; border-radius: 8px; max-width: 80%; }
        .bot { background-color: #e9ecef; align-self: flex-start; }
        .user { background-color: #007bff; color: white; align-self: flex-end; }
        .chat-input { display: flex; border-top: 1px solid #ddd; }
        .chat-input input { flex: 1; padding: 15px; border: none; outline: none; }
        .chat-input button { padding: 15px; background-color: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Asistente del Hotel (Huésped) <br><small id="status">Conectando...</small></div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input">
        <input type="text" id="messageText" placeholder="Escribe tu duda..." autocomplete="off">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
    const token = prompt("Pega el Token JWT de un HUÉSPED aquí:");
    
    const ws = new WebSocket("ws://127.0.0.1:8000/ws/chat?token=" + token);
    const messagesDiv = document.getElementById("messages");
    const inputField = document.getElementById("messageText");

    ws.onopen = () => document.getElementById("status").textContent = "🟢 En línea";
    ws.onclose = () => document.getElementById("status").textContent = "🔴 Desconectado";

    ws.onmessage = function(event) {
        addMessage(event.data, "bot");
    };

    function sendMessage() {
        const text = inputField.value.trim();
        if (text) {
            addMessage("Tú: " + text, "user");
            ws.send(text); 
            inputField.value = "";
        }
    }

    function addMessage(text, sender) {
        const msgDiv = document.createElement("div");
        msgDiv.className = "message " + sender;
        msgDiv.textContent = text;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
</script>
</body>
</html>
