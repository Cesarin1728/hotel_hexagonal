<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrador - Hotel</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #eef2f5; display: flex; justify-content: center; margin-top: 50px; }
        .chat-container { background-color: #fff; width: 500px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .chat-header { background-color: #b71c1c; color: #fff; padding: 15px; text-align: center; font-weight: bold; }
        .chat-messages { height: 400px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-color: #fafafa; border-bottom: 2px solid #ddd;}
        .message { padding: 10px; border-radius: 8px; max-width: 85%; }
        .client-msg { background-color: #fff3e0; border-left: 4px solid #ff9800; align-self: flex-start; }
        .admin-msg { background-color: #e3f2fd; border-right: 4px solid #2196f3; align-self: flex-end; text-align: right; }
        .controls { padding: 10px; display: flex; gap: 5px; flex-direction: column; background: #eee;}
        .target-box { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 14px;}
        .target-box input { width: 60px; padding: 5px; text-align: center; }
        .chat-input { display: flex; gap: 5px; }
        .chat-input input { flex: 1; padding: 10px; border: 1px solid #ccc; outline: none; }
        .chat-input button { padding: 10px 15px; background-color: #b71c1c; color: white; border: none; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Panel de Recepción (Administrador) <br><small id="status">Conectando...</small></div>
    <div class="chat-messages" id="messages"></div>
    
    <div class="controls">
        <div class="target-box">
            <label>Responder a Cliente ID:</label>
            <input type="number" id="targetId" placeholder="ID">
        </div>
        <div class="chat-input">
            <input type="text" id="messageText" placeholder="Escribe tu respuesta al cliente..." autocomplete="off">
            <button onclick="sendMessage()">Responder</button>
        </div>
    </div>
</div>

<script>
    const token = prompt("Pega el Token JWT del ADMINISTRADOR aquí:");
    
    const ws = new WebSocket("ws://127.0.0.1:8000/ws/chat?token=" + token);
    const messagesDiv = document.getElementById("messages");
    const inputField = document.getElementById("messageText");
    const targetIdField = document.getElementById("targetId");

    ws.onopen = () => document.getElementById("status").textContent = "🟢 En línea";
    ws.onclose = () => document.getElementById("status").textContent = "🔴 Desconectado";

    ws.onmessage = function(event) {
        try {
            const data = JSON.parse(event.data);
            
            if (data.id_cliente) {
                targetIdField.value = data.id_cliente;
            }
            
            addMessage(data.msg, "client-msg");
        } catch (e) {
            addMessage("Sistema: " + event.data, "client-msg");
        }
    };

    function sendMessage() {
        const text = inputField.value.trim();
        const targetId = targetIdField.value.trim();
        
        if (text && targetId) {
            const payload = JSON.stringify({
                "id_cliente": parseInt(targetId),
                "msg": text
            });
            
            ws.send(payload);
            addMessage("Tú (al cliente " + targetId + "): " + text, "admin-msg");
            inputField.value = "";
        } else {
            alert("Necesitas especificar un ID de cliente y escribir un mensaje.");
        }
    }

    function addMessage(text, typeClass) {
        const msgDiv = document.createElement("div");
        msgDiv.className = "message " + typeClass;
        msgDiv.textContent = text;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
</script>
</body>
</html>
//Generado por Gemini para poder comprobar la funcionalidad de los chats
