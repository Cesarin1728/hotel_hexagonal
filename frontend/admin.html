<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Admin</title></head>
<body>
    <h1>Panel Administrador</h1>
    
    <h3>Alta Cuartos</h3>
    <form id="form-alta">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="detalles" placeholder="Detalles" required>
        <input type="number" id="precio" placeholder="Precio" required>
        <input type="text" id="espacio" placeholder="Capacidad" required>
        <input type="file" id="imagen" required>
        <button type="submit">Subir</button>
    </form>

    <h3>Chat Soporte</h3>
    <div id="chat-box" style="height:100px; border:1px solid #000; overflow-y:scroll;"></div>
    <input type="text" id="chat-input"><button id="chat-send">Responder</button>

    <script type="module">
        import { cuartoAdapter } from './src/presentation/app.js';
        import { ChatAdapter } from './src/infrastructure/websocket/ChatAdapter.js';

        document.getElementById('form-alta').addEventListener('submit', async (e) => {
            e.preventDefault();
            const datos = {
                nombre: document.getElementById('nombre').value, detalles: document.getElementById('detalles').value,
                precio: document.getElementById('precio').value, espacio: document.getElementById('espacio').value
            };
            try {
                await cuartoAdapter.crear(datos, document.getElementById('imagen').files[0], localStorage.getItem('token'));
                alert("Cuarto Creado"); e.target.reset();
            } catch(err) { alert(err.message); }
        });

        const chat = new ChatAdapter('ws://localhost:8000');
        chat.conectar('admin', msg => document.getElementById('chat-box').innerHTML += `<p>Cliente: ${msg}</p>`);
        document.getElementById('chat-send').addEventListener('click', () => {
            chat.enviarMensaje(document.getElementById('chat-input').value);
        });
    </script>
</body>
</html>
