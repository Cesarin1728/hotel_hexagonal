<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Reservas</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-5 p-3">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold text-dark fs-4">Mis Reservas</span>
            <div class="d-flex gap-3 align-items-center">
                <a href="index.html" class="text-decoration-none fw-bold text-primary">Ver Catálogo</a>
                <button class="btn btn-outline-danger fw-bold btn-sm" onclick="localStorage.clear(); window.location.href='login.html'">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Tabla de Reservas -->
        <div class="card shadow-sm border-0 mb-5">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle text-center mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th class="py-3">Folio</th>
                                <th class="py-3">Cuarto</th>
                                <th class="py-3">Fecha de Llegada</th>
                                <th class="py-3">Noches</th>
                                <th class="py-3">Costo Total</th>
                                <th class="py-3">Servicio</th>
                                <th class="py-3">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="lista-reservas">
                            <tr><td colspan="7" class="py-4 text-muted"><div class="spinner-border spinner-border-sm me-2"></div>Cargando tus reservas...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Zona de Peligro -->
        <div class="alert alert-danger border-start border-danger border-4 shadow-sm p-4 d-flex justify-content-between align-items-center flex-wrap gap-3" role="alert">
            <div>
                <h4 class="alert-heading fw-bold text-danger mb-1">Zona de Precaución</h4>
                <p class="mb-0 text-dark">Al eliminar tu cuenta se borrarán permanentemente todas tus reservas e historial. Esta acción no se puede deshacer.</p>
            </div>
            <button class="btn btn-danger fw-bold px-4" onclick="window.eliminarCuenta()">Eliminar mi cuenta</button>
        </div>
    </div>

    <script type="module">
        import { reservaAdapter } from './src/presentation/app.js';

        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        const payload = JSON.parse(atob(token.split('.')[1]));
        const id_usuario = payload.id;

        const cargarReservas = async () => {
            try {
                const reservas = await reservaAdapter.listarPorHuesped(id_usuario, token);
                const tbody = document.getElementById('lista-reservas');

                if (reservas.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="py-5 text-muted fw-bold">No tienes reservas registradas todavía.</td></tr>';
                    return;
                }

                tbody.innerHTML = reservas.map(r => `
                    <tr>
                        <td class="fw-bold text-secondary">#${r.id}</td>
                        <td>Habitación ${r.cuartoId}</td>
                        <td>${r.fecha ? r.fecha.split('T')[0] : '—'}</td>
                        <td>${r.noches} <small class="text-muted">noches</small></td>
                        <td class="text-success fw-bold fs-5">$${r.costo}</td>
                        <td><span class="badge ${r.servicioCuarto ? 'bg-info' : 'bg-secondary'}">${r.servicioCuarto ? 'Sí' : 'No'}</span></td>
                        <td><button class="btn btn-outline-danger btn-sm fw-bold" onclick="window.eliminarReserva(${r.id})">Cancelar</button></td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('lista-reservas').innerHTML = '<tr><td colspan="7" class="text-danger py-4 fw-bold">Error al cargar tus reservas.</td></tr>';
            }
        };

        window.eliminarReserva = async (id) => {
            if (!confirm(`¿Cancelar la reserva #${id}? Esta acción no se puede deshacer.`)) return;
            try {
                const res = await fetch(`http://localhost:8000/api/reservas/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error("No se pudo cancelar");
                alert("Reserva cancelada correctamente.");
                cargarReservas();
            } catch (e) { alert("Error: " + e.message); }
        };

        window.eliminarCuenta = async () => {
            if (!confirm("⚠️ ¿Estás seguro? Se eliminarán tu cuenta y TODAS tus reservas permanentemente.")) return;
            if (!confirm("Esta acción es irreversible. ¿Confirmas?")) return;
            try {
                const res = await fetch('http://localhost:8000/api/auth/cuenta', {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error("Error al eliminar cuenta");
                alert("Tu cuenta ha sido eliminada exitosamente.");
                localStorage.clear();
                window.location.href = 'login.html';
            } catch (e) { alert("Error: " + e.message); }
        };

        cargarReservas();
    </script>
</body>
</html>
