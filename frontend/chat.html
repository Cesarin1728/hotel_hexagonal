<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte y Chat - Hotel</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f9; }
        nav { background: #333; color: white; padding: 15px; display: flex; gap: 15px; }
        nav a { color: white; text-decoration: none; font-weight: bold; }
        .chat-container { max-width: 800px; margin: 40px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #chat-messages { height: 500px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; background: #fafafa; border-radius: 5px; }
        .input-area { display: flex; gap: 10px; }
        #chat-input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #007BFF; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .msg-tu { color: #0056b3; margin-bottom: 8px; text-align: right; }
        .msg-recepcion { color: #28a745; margin-bottom: 8px; text-align: left; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Catálogo de Cuartos</a>
        <a href="historial.html">Mi Historial</a>
        <a href="chat.html">Soporte (Chat)</a>
    </nav>

    <div class="chat-container">
        <h2>Atención al Cliente en Vivo</h2>
        <p>Escribe tus dudas y nuestro bot o un administrador te responderá enseguida.</p>
        
        <div id="chat-messages">
            </div>
        
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Escribe tu mensaje aquí...">
            <button id="btn-enviar">Enviar</button>
        </div>
    </div>

    <script type="module">
        import { ChatAdapter } from './src/infrastructure/websocket/ChatAdapter.js';

        const tokenDeSesion = localStorage.getItem('token');
        if (!tokenDeSesion) {
            window.location.href = "login.html";
        }

        const mensajesArea = document.getElementById('chat-messages');
        const inputMsg = document.getElementById('chat-input');
        const btnEnviarMsg = document.getElementById('btn-enviar');

        const chat = new ChatAdapter('ws://localhost:8000');
        
        chat.conectar(tokenDeSesion, (msg) => {
            mensajesArea.innerHTML += `<div class="msg-recepcion"><b>Recepción/Bot:</b> ${msg}</div>`;
        });

        btnEnviarMsg.addEventListener('click', () => {
            const texto = inputMsg.value.trim();
            if (texto) {
                chat.enviarMensaje(texto);
                mensajesArea.innerHTML += `<div class="msg-tu"><b>Tú:</b> ${texto}</div>`;
                inputMsg.value = '';
                mensajesArea.scrollTop = mensajesArea.scrollHeight; 
            }
        });

    </script>
</body>
</html>
