<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Hexagonal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; min-height: 100vh; }
        .card { border: none; border-radius: 12px; }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">
<div class="container">
<div class="row justify-content-center gap-4 py-5">

    <div class="col-12 col-md-4">
        <div class="card shadow-sm p-4">
            <h5 class="fw-bold mb-3">Iniciar sesión</h5>

            <div class="mb-3">
                <label class="form-label">Correo</label>
                <input type="email" 
                    class="form-control" 
                    id="login-email" 
                    placeholder="ejemplo@correo.com"
                    required
                    pattern="(?:[a-z0-9!#$%&'*+/=?^_{|}~-]+(?:\.[a-z0-9!#$%&'*+/=?^_{|}~-]+)*|&quot;(?:[\x01-\x08\x0b\x0c\x0e-\x1f\x21\x23-\x5b\x5d-\x7f]|\
            \[\x01-\x09\x0b\x0c\x0e-\x7f])*&quot;)@(?:(?:[a-z0-9](?:[a-z0-9-]*[a-z0-9])?\.)+[a-z0-9](?:[a-z0-9-]*[a-z0-9])?|
            \[(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?|[a-z0-9-]*[a-z0-9]:(?:[\x01-\x08\x0b\x0c\x0e-\x1f\x21-\x5a\x53-\x7f]|\
            \[\x01-\x09\x0b\x0c\x0e-\x7f])+)\]
            )"
                    title="Correo mal escrito">
            </div>


            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary w-100" id="btn-login" onclick="handleLogin()">Ingresar</button>
            <div id="login-msg" class="alert mt-3 mb-0" style="display:none;"></div>
        </div>
    </div>

    <div class="col-12 col-md-4">
        <div class="card shadow-sm p-4">
            <h5 class="fw-bold mb-3">Crear cuenta</h5>
            <div class="mb-3">
                <label class="form-label">Correo</label>
                <input type="email" 
                    class="form-control" 
                    id="reg-email" 
                    placeholder="ejemplo@correo.com"
                    required
                    pattern="(?:[a-z0-9!#$%&'*+/=?^_{|}~-]+(?:\.[a-z0-9!#$%&'*+/=?^_{|}~-]+)*|&quot;(?:[\x01-\x08\x0b\x0c\x0e-\x1f\x21\x23-\x5b\x5d-\x7f]|\
            \[\x01-\x09\x0b\x0c\x0e-\x7f])*&quot;)@(?:(?:[a-z0-9](?:[a-z0-9-]*[a-z0-9])?\.)+[a-z0-9](?:[a-z0-9-]*[a-z0-9])?|
            \[(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?|[a-z0-9-]*[a-z0-9]:(?:[\x01-\x08\x0b\x0c\x0e-\x1f\x21-\x5a\x53-\x7f]|\
            \[\x01-\x09\x0b\x0c\x0e-\x7f])+)\]
            )"
                    title="Correo mal escrito">
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="reg-password" placeholder="••••••••">
            </div>
            <button class="btn btn-success w-100" id="btn-registro" onclick="handleRegistro()">Crear cuenta</button>
            <div id="reg-msg" class="alert mt-3 mb-0" style="display:none;"></div>
        </div>
    </div>

</div>
</div>

<script>
    localStorage.clear();

    async function handleLogin() {
        const btn = document.getElementById('btn-login');
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const msg = document.getElementById('login-msg');

        if (!email || !password) return showMsg(msg, 'Completa todos los campos', 'danger');

        btn.disabled = true; btn.textContent = 'Verificando...';

        const params = new URLSearchParams();
        params.append('username', email);
        params.append('password', password);

        try {
            const res = await fetch('http://localhost:8000/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Credenciales inválidas');

            localStorage.setItem('token', data.access_token);
            if (data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);

            const payload = JSON.parse(atob(data.access_token.split('.')[1]));
            window.location.href = (payload.rol === 'Administrador' || payload.role === 'Administrador')
                ? 'admin.html' : 'index.html';

        } catch (err) {
            showMsg(msg, err.message, 'danger');
        } finally {
            btn.disabled = false; btn.textContent = 'Ingresar';
        }
    }

    async function handleRegistro() {
        const btn = document.getElementById('btn-registro');
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const msg = document.getElementById('reg-msg');

        if (!email || !password) return showMsg(msg, 'Completa todos los campos.', 'danger');

        btn.disabled = true; btn.textContent = 'Creando...';

        try {
            const res = await fetch('http://localhost:8000/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, rol: 'Cliente' })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Error al crear la cuenta');

            showMsg(msg, 'Cuenta creada', 'success');
            document.getElementById('reg-email').value = '';
            document.getElementById('reg-password').value = '';

        } catch (err) {
            showMsg(msg, "Correo mal escrito", 'danger');
        } finally {
            btn.disabled = false; btn.textContent = 'Crear cuenta';
        }
    }

    function showMsg(el, text, type) {
        el.textContent = text;
        el.className = `alert alert-${type} mt-3 mb-0`;
        el.style.display = 'block';
    }
</script>
</body>
</html>
