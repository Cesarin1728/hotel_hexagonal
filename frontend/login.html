<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Login</title></head>
<body>

    <h2>Iniciar Sesión</h2>
    <form id="login-form">
        <input type="email" id="user" placeholder="Email" required>
        <input type="password" id="pass" placeholder="Contraseña" required>
        <button type="submit">Entrar</button>
    </form>

    <hr>

    <h2>Registrarse</h2>
    <form id="register-form">
        <input type="email" id="reg-email" placeholder="Email" required>
        <input type="password" id="reg-pass" placeholder="Contraseña" required>
        <input type="text" id="reg-username" placeholder="Username" required>
        <input type="number" id="reg-edad" placeholder="Edad" min="18" required>
        <select id="reg-miembro">
            <option value="false">Sin membresía</option>
            <option value="true">Con membresía (Premium)</option>
        </select>
        <button type="submit">Crear Cuenta</button>
    </form>

    <script type="module">
        import { authAdapter } from './src/presentation/app.js';

        const BACKEND = 'http://localhost:8000';

        // Si ya hay sesión válida, redirigir directo
        const tokenExistente = localStorage.getItem('token');
        if (tokenExistente) {
            try {
                const payload = JSON.parse(atob(tokenExistente.split('.')[1]));
                window.location.href = payload.rol === 'Administrador' ? 'admin.html' : 'index.html';
            } catch(e) { localStorage.clear(); }
        }

        // LOGIN
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            try {
                const data = await authAdapter.login(u, p);
                localStorage.setItem('token', data.access_token);
                const payload = JSON.parse(atob(data.access_token.split('.')[1]));
                window.location.href = payload.rol === 'Administrador' ? 'admin.html' : 'index.html';
            } catch (error) { alert("Credenciales inválidas."); }
        });

        // REGISTRO
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email    = document.getElementById('reg-email').value.trim();
            const pass     = document.getElementById('reg-pass').value;
            const username = document.getElementById('reg-username').value.trim();
            const edad     = parseInt(document.getElementById('reg-edad').value);
            const miembro  = document.getElementById('reg-miembro').value === 'true';

            if (edad < 18) return alert("Debes ser mayor de edad.");

            const btn = e.target.querySelector('button');
            btn.textContent = "Registrando..."; btn.disabled = true;

            try {
                // Paso 1: crear usuario
                const resReg = await fetch(`${BACKEND}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass, rol: 'Cliente' })
                });
                if (!resReg.ok) {
                    const err = await resReg.json();
                    throw new Error(err.detail || "Error al registrar");
                }

                // Paso 2: login para obtener token
                const data = await authAdapter.login(email, pass);
                const token = data.access_token;
                localStorage.setItem('token', token);

                // Paso 3: crear perfil huésped
                const resHuesped = await fetch(`${BACKEND}/api/huespedes/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({
                        username, clave: pass, miembro,
                        economia: miembro ? 'Premium' : 'Estandar', edad
                    })
                });
                if (!resHuesped.ok) throw new Error("Error al crear perfil de huésped");

                alert(`¡Bienvenido, ${username}!`);
                window.location.href = 'index.html';
            } catch (err) {
                alert("Error: " + err.message);
                localStorage.clear();
            } finally {
                btn.textContent = "Crear Cuenta"; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
