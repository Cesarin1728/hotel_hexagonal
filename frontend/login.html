<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Hotel Hexagonal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
        }
        .card-login {
            border: none;
            border-radius: 12px;
        }
        .btn-primary-custom {
            background-color: #2980b9;
            border-color: #2980b9;
            font-weight: bold;
            padding: 12px;
            transition: background-color 0.2s;
        }
        .btn-primary-custom:hover {
            background-color: #21618c;
            border-color: #21618c;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                
                <div class="card card-login shadow-sm p-4 bg-white">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4 fw-bold text-dark">Iniciar Sesión</h2>
                        
                        <form id="form-login">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold text-secondary">Correo Electrónico</label>
                                <input type="email" class="form-control form-control-lg fs-6" id="username" placeholder="ejemplo@correo.com" required>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold text-secondary">Contraseña</label>
                                <input type="password" class="form-control form-control-lg fs-6" id="password" placeholder="••••••••" required>
                            </div>
                            
                            <button type="submit" id="btn-ingresar" class="btn btn-primary-custom w-100 text-white btn-lg fs-6 shadow-sm">
                                Ingresar
                            </button>
                        </form>
                        
                        <div id="error-box" class="alert alert-danger mt-3 text-center fw-medium border-start border-danger border-4" role="alert" style="display: none;"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btn-ingresar');
            const errorBox = document.getElementById('error-box');
            
            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Verificando...`;
            btn.disabled = true;
            errorBox.style.display = 'none';

            const email = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const params = new URLSearchParams();
            params.append('username', email);
            params.append('password', password);

            try {
                const response = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Credenciales inválidas');
                }

                localStorage.setItem('token', data.access_token);
                if (data.refresh_token) {
                    localStorage.setItem('refresh_token', data.refresh_token);
                }

                const payloadBase64 = data.access_token.split('.')[1];
                const userPayload = JSON.parse(atob(payloadBase64));

                if (userPayload.rol === 'Administrador' || userPayload.role === 'Administrador') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }

            } catch (error) {
                errorBox.textContent = error.message;
                errorBox.style.display = 'block';
            } finally {
                btn.textContent = "Ingresar";
                btn.disabled = false;
            }
        });

        localStorage.clear();
    </script>
</body>
</html>
