<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Catálogo</title></head>
<body>
    <h1>Catálogo de Habitaciones</h1>
    <nav>
        <a href="checkout.html" style="margin-right: 15px; text-decoration: none;">🛒 Mi Carrito</a>
        <a href="historial.html" style="margin-right: 15px; text-decoration: none;">Mis Reservas</a>
        <a href="login.html" style="text-decoration: none; color: #e74c3c; font-weight: bold;" onclick="localStorage.clear()">Entrar / Salir</a>
    </nav>
    <div id="catalogo"></div>
    
    <div style="position:fixed; bottom:0; right:0; border:1px solid #000; padding:10px; background:#fff;">
        <h3>Chat Recepción</h3>
        <div id="chat-box" style="height:100px; overflow-y:scroll;"></div>
        <input type="text" id="chat-input"><button id="chat-send">Enviar</button>
    </div>

   <script type="module">
        import { cuartoAdapter } from './src/presentation/app.js';
        import { ChatAdapter } from './src/infrastructure/websocket/ChatAdapter.js';

        // 1. Lógica mejorada: Validamos la sesión
        window.reservar = (id) => {
            const token = localStorage.getItem('token');
            
            if (!token) {
                alert("Debes iniciar sesión primero para poder reservar.");
                window.location.href = "login.html"; 
                return;
            }

            localStorage.setItem('carrito', id);
            alert("¡Cuarto pre-reservado! Te llevaremos al checkout para elegir las fechas.");
            window.location.href = "checkout.html"; 
        };

        // 2. Carga del Catálogo
        document.addEventListener('DOMContentLoaded', async () => {
            const div = document.getElementById('catalogo');
            const cuartos = await cuartoAdapter.listarTodos();
            div.innerHTML = cuartos.map(c => `
                <div style="border:1px solid #ccc; margin:10px; padding:10px;">
                    <img src="${c.imagen_url}" width="200">
                    <h3>${c.nombre} - $${c.precio}</h3>
                    <p>${c.detalles} | Capacidad: ${c.espacio}</p>
                    
                    <button onclick="window.reservar(${c.id})" style="padding: 10px; background: #2980b9; color: white; border: none; cursor:pointer;">Reservar</button>
                </div>
            `).join('');
        });

        // 3. Lógica del Chat
        // Lógica del Chat
        const chat = new ChatAdapter('ws://localhost:8000');
        const tokenChat = localStorage.getItem('token');
        
        // Solo intentamos conectar el chat si el usuario ya inició sesión
        if (tokenChat) {
            chat.conectar(tokenChat, msg => {
                document.getElementById('chat-box').innerHTML += `<p>${msg}</p>`;
            });
            
            document.getElementById('chat-send').addEventListener('click', () => {
                chat.enviarMensaje(document.getElementById('chat-input').value);
                document.getElementById('chat-input').value = '';
            });
        } else {
            document.getElementById('chat-box').innerHTML = "<p><i>Inicia sesión para usar el chat</i></p>";
        }
    </script>
</body>
</html>
