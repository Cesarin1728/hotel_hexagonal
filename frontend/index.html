<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Catálogo</title></head>
<body>
    <h1>Catálogo de Habitaciones</h1>
    <nav><a href="checkout.html">🛒 Checkout</a> | <a href="historial.html">Historial</a></nav>
    <div id="catalogo"></div>
    
    <div style="position:fixed; bottom:0; right:0; border:1px solid #000; padding:10px; background:#fff;">
        <h3>Chat Recepción</h3>
        <div id="chat-box" style="height:100px; overflow-y:scroll;"></div>
        <input type="text" id="chat-input"><button id="chat-send">Enviar</button>
    </div>

    <script type="module">
        import { cuartoAdapter } from './src/presentation/app.js';
        import { ChatAdapter } from './src/infrastructure/websocket/ChatAdapter.js';

        document.addEventListener('DOMContentLoaded', async () => {
            const div = document.getElementById('catalogo');
            const cuartos = await cuartoAdapter.listarTodos();
            div.innerHTML = cuartos.map(c => `
                <div style="border:1px solid #ccc; margin:10px; padding:10px;">
                    <img src="${c.imagen_url}" width="200">
                    <h3>${c.nombre} - $${c.precio}</h3>
                    <p>${c.detalles} | Capacidad: ${c.espacio}</p>
                    <button onclick="localStorage.setItem('carrito', ${c.id}); alert('Agregado');">Reservar</button>
                </div>
            `).join('');
        });

        const chat = new ChatAdapter('ws://localhost:8000');
        chat.conectar('huesped', msg => document.getElementById('chat-box').innerHTML += `<p>Recepción: ${msg}</p>`);
        document.getElementById('chat-send').addEventListener('click', () => {
            chat.enviarMensaje(document.getElementById('chat-input').value);
        });
    </script>
</body>
</html>
