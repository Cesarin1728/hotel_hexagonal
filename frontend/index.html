<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Habitaciones</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .cuarto-img { height: 100%; min-height: 200px; object-fit: cover; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1050; justify-content: center; align-items: center; }
        .chat-floating { width: 340px; z-index: 1040; }
        .chat-messages { height: 220px; overflow-y: auto; font-size: 14px; }
    </style>
</head>
<body class="bg-light pb-5">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-5 p-3">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold text-dark fs-4">Catálogo de Habitaciones</span>
            <div class="d-flex gap-3 align-items-center">
                <a href="historial.html" class="text-decoration-none fw-bold text-secondary">Mis Reservas</a>
                <button class="btn btn-outline-danger fw-bold btn-sm" onclick="localStorage.clear(); window.location.href='login.html'">Entrar / Salir</button>
            </div>
        </div>
    </nav>

    <!-- Catálogo -->
    <div class="container" id="contenedor-cuartos">
        <div class="text-center text-muted mt-5">
            <div class="spinner-border mb-2" role="status"></div>
            <p>Cargando habitaciones disponibles...</p>
        </div>
    </div>

    <!-- Modal Reserva -->
    <div id="modal-reserva" class="modal-overlay">
        <div class="card p-4 shadow" style="width: 400px;">
            <h4 class="text-dark fw-bold mb-3 border-bottom pb-2">Reservar C-<span id="reserva-id-cuarto" class="text-primary"></span></h4>
            <form id="form-reserva">
                <input type="hidden" id="r-id-cuarto">
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Fecha de Llegada:</label>
                    <input type="date" id="r-inicio" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Fecha de Salida:</label>
                    <input type="date" id="r-fin" class="form-control" required>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('modal-reserva').style.display='none'">Cancelar</button>
                    <button type="submit" id="btn-confirmar-reserva" class="btn btn-success fw-bold">Confirmar Compra</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Chat Flotante -->
    <div class="card chat-floating position-fixed bottom-0 end-0 m-3 shadow-lg border-0">
        <div class="card-header bg-dark text-white fw-bold py-2">
            Chat Recepción
        </div>
        <div class="card-body bg-light chat-messages" id="chat-mensajes">
            <div class="text-center text-muted mt-5">Conectando...</div>
        </div>
        <div class="card-footer bg-white p-0 border-top">
            <div class="input-group">
                <input type="text" id="input-msg" class="form-control border-0 shadow-none py-2" placeholder="Escribe tu duda aquí...">
                <button id="btn-enviar-msg" class="btn btn-success rounded-0 px-3 fw-bold">Enviar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { cuartoAdapter, reservaAdapter } from './src/presentation/app.js';
        import { ChatAdapter } from './src/infrastructure/websocket/ChatAdapter.js';

        const tokenDeSesion = localStorage.getItem('token');
        if (!tokenDeSesion) {
            window.location.href = "login.html";
        } else {
            try {
                const payloadBase64 = tokenDeSesion.split('.')[1];
                const datosUsuario = JSON.parse(atob(payloadBase64));
                if (datosUsuario.role === 'Administrador' || datosUsuario.rol === 'Administrador') {
                    window.location.href = 'admin.html';
                }
            } catch (error) {
                console.error("Token de sesión inválido");
            }
        }

        const contenedor = document.getElementById('contenedor-cuartos');

        const renderizarCatalogo = async () => {
            try {
                const cuartos = await cuartoAdapter.listarTodos();
                if (cuartos.length === 0) {
                    contenedor.innerHTML = `<p class="text-center text-muted">No hay habitaciones registradas en este momento.</p>`;
                    return;
                }
                contenedor.innerHTML = cuartos.map(c => `
                    <div class="card mb-4 shadow-sm border-0">
                        <div class="row g-0">
                            <div class="col-md-4">
                                <img src="${c.imagen_url || 'https://via.placeholder.com/400x300?text=Sin+Foto'}" class="img-fluid rounded-start cuarto-img w-100" alt="${c.nombre}">
                            </div>
                            <div class="col-md-8">
                                <div class="card-body d-flex flex-column h-100 justify-content-between p-4">
                                    <div>
                                        <h4 class="card-title fw-bold text-dark">${c.nombre}</h4>
                                        <p class="card-text text-secondary">${c.detalles}</p>
                                        <p class="card-text"><small class="text-muted"><i class="bi bi-people-fill"></i> Capacidad: ${c.espacio}</small></p>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center mt-3">
                                        <span class="fs-4 fw-bold text-success">$${c.precio} <small class="fs-6 fw-normal text-muted">/ noche</small></span>
                                        <button class="btn btn-primary fw-bold px-4" onclick="window.abrirModalReserva(${c.id})">Reservar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                contenedor.innerHTML = `<div class="alert alert-danger">Error al conectar con el backend de habitaciones.</div>`;
            }
        };

        window.abrirModalReserva = (id) => {
            document.getElementById('r-id-cuarto').value = id;
            document.getElementById('reserva-id-cuarto').innerText = id;
            document.getElementById('modal-reserva').style.display = 'flex';
        };

        document.getElementById('form-reserva').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-confirmar-reserva');
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Procesando...`; 
            btn.disabled = true;

            const idCuarto = document.getElementById('r-id-cuarto').value;
            const strInicio = document.getElementById('r-inicio').value;
            const strFin = document.getElementById('r-fin').value;

            const fInicio = new Date(strInicio);
            const fFin = new Date(strFin);
            const nochesCalculadas = Math.ceil(Math.abs(fFin - fInicio) / (1000 * 60 * 60 * 24)) || 1;

            const payloadBase64 = tokenDeSesion.split('.')[1];
            const userPayload = JSON.parse(atob(payloadBase64));

            const datosReserva = {
                espacio: "Estándar",
                fecha: strInicio + "T00:00:00", 
                servicio_cuarto: false,
                noches: nochesCalculadas,
                id_cuarto: parseInt(idCuarto),
                id_huesped: userPayload.id 
            };

            try {
                await reservaAdapter.crearReserva(datosReserva, tokenDeSesion);
                alert("¡Habitación reservada con éxito!");
                window.location.href = 'historial.html';
            } catch (err) {
                alert("Error al procesar la reserva. Verifica que las fechas no se traslapen con otra estancia.");
            } finally {
                btn.innerHTML = "Confirmar Compra"; 
                btn.disabled = false;
            }
        });

        const mensajesArea = document.getElementById('chat-mensajes');
        const inputMsg = document.getElementById('input-msg');
        const btnEnviarMsg = document.getElementById('btn-enviar-msg');

        if (tokenDeSesion) {
            mensajesArea.innerHTML = '';
            const chat = new ChatAdapter('ws://localhost:8000');
            
            chat.conectar(tokenDeSesion, (msg) => {
                // Evaluamos si es un mensaje de historial antiguo del cliente
                if (msg.startsWith("Cliente") || msg.startsWith("Bot:")) {
                    if (msg.startsWith("Cliente")) {
                        // Limpiamos el prefijo 'Cliente ID: ' para que solo quede el texto
                        const textoLimpio = msg.split(': ').slice(1).join(': ');
                        mensajesArea.innerHTML += `<div class="mb-2 text-end"><strong class="text-primary">Tú:</strong> <span class="text-dark">${textoLimpio}</span></div>`;
                    } else {
                        // Mensaje del bot automático
                        const textoBot = msg.replace('Bot: ', '');
                        mensajesArea.innerHTML += `<div class="mb-2"><strong class="text-secondary">Bot:</strong> <span class="text-secondary">${textoBot}</span></div>`;
                    }
                } 
                // Evaluamos si es una respuesta del Admin (en vivo o de historial)
                else if (msg.startsWith("Admin:")) {
                    const textoAdmin = msg.replace('Admin: ', '');
                    mensajesArea.innerHTML += `<div class="mb-2"><strong class="text-dark">Recepción:</strong> <span class="text-secondary">${textoAdmin}</span></div>`;
                } 
                // Mensaje en vivo (JSON o crudo) que viene del sistema
                else {
                    try {
                        const data = JSON.parse(msg);
                        // Si es aviso del sistema ("Administrador ocupado", etc)
                        mensajesArea.innerHTML += `<div class="mb-2 text-center text-muted fst-italic small">${data.msg || msg}</div>`;
                    } catch (e) {
                        // Fallback de seguridad si no encaja en nada
                        mensajesArea.innerHTML += `<div class="mb-2"><strong class="text-dark">Recepción:</strong> <span class="text-secondary">${msg}</span></div>`;
                    }
                }
                mensajesArea.scrollTop = mensajesArea.scrollHeight;
            });

            btnEnviarMsg.addEventListener('click', () => {
                const texto = inputMsg.value.trim();
                if (!texto) return;
                chat.enviarMensaje(texto);
                mensajesArea.innerHTML += `<div class="mb-2 text-end"><strong class="text-primary">Tú:</strong> <span class="text-dark">${texto}</span></div>`;
                inputMsg.value = '';
                mensajesArea.scrollTop = mensajesArea.scrollHeight;
            });
            
            inputMsg.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') btnEnviarMsg.click();
            });
        }

        renderizarCatalogo();
    </script>
</body>
</html>
