<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Carrito</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5" style="max-width: 600px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <h2 class="fw-bold text-dark m-0">Confirmar Reservas</h2>
            <a href="index.html" class="btn btn-outline-secondary btn-sm fw-bold">Volver al Catálogo</a>
        </div>
        
        <div id="mensaje-vacio" class="text-center text-muted mb-4"></div>
        
        <div id="lista-carrito" class="d-flex flex-column gap-3 mb-4"></div>

        <button id="btn-pagar-todo" class="btn btn-success btn-lg w-100 fw-bold shadow-sm" style="display: none;">
            Pagar Todo el Carrito
        </button>

    </div>

    <script type="module">
        import { reservaAdapter } from './src/presentation/app.js';
        
        const contenedorCarrito = document.getElementById('lista-carrito');
        const btnPagar = document.getElementById('btn-pagar-todo');
        const mensajeVacio = document.getElementById('mensaje-vacio');

        let carrito = JSON.parse(localStorage.getItem('carrito')) || [];

        if (carrito.length === 0) {
            mensajeVacio.innerHTML = `<h4 class="mt-5">Tu carrito está vacío.</h4>`;
        } else {
            btnPagar.style.display = 'block';
            contenedorCarrito.innerHTML = carrito.map(id => `
                <div class="card shadow-sm border-0 item-reserva" data-id="${id}">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="card-title text-primary fw-bold m-0">Habitación #${id}</h5>
                            <button type="button" class="btn btn-outline-danger btn-sm" onclick="window.eliminarItem(${id})">Eliminar</button>
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="form-label text-secondary fw-bold mb-1">Llegada</label>
                                <input type="date" class="form-control input-inicio" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label text-secondary fw-bold mb-1">Salida</label>
                                <input type="date" class="form-control input-fin" required>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.eliminarItem = (id) => {
            carrito = carrito.filter(itemId => itemId !== id);
            localStorage.setItem('carrito', JSON.stringify(carrito));
            location.reload();
        };

        btnPagar.addEventListener('click', async () => {
            const token = localStorage.getItem('token');
            if (!token) return alert("No has iniciado sesión.");
            
            const payloadBase64 = token.split('.')[1];
            const userPayload = JSON.parse(atob(payloadBase64));

            const bloques = document.querySelectorAll('.item-reserva');
            const promesasDeReserva = [];

            for (let bloque of bloques) {
                const idCuarto = bloque.getAttribute('data-id');
                const strInicio = bloque.querySelector('.input-inicio').value;
                const strFin = bloque.querySelector('.input-fin').value;

                if (!strInicio || !strFin) {
                    alert(`Faltan fechas en la Habitación #${idCuarto}`);
                    return; 
                }

                const fInicio = new Date(strInicio);
                const fFin = new Date(strFin);
                const nochesCalculadas = Math.ceil(Math.abs(fFin - fInicio) / (1000 * 60 * 60 * 24)) || 1;

                const datosReserva = {
                    espacio: "Estándar",
                    fecha: strInicio + "T00:00:00", 
                    servicio_cuarto: false,
                    noches: nochesCalculadas,
                    id_cuarto: parseInt(idCuarto),
                    id_huesped: userPayload.id 
                };
                promesasDeReserva.push(reservaAdapter.crearReserva(datosReserva, token));
            }

            try {
                btnPagar.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Procesando...`;
                btnPagar.disabled = true;
                await Promise.all(promesasDeReserva);
                alert("¡Todas las reservas fueron procesadas con éxito!");
                localStorage.removeItem('carrito'); 
                window.location.href = 'historial.html'; 
            } catch (err) { 
                alert("Error al procesar: " + err.message); 
                btnPagar.textContent = "Pagar Todo el Carrito";
                btnPagar.disabled = false;
            }
        });
    </script>
</body>
</html>
